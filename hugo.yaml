# Hugo configuration file
title: TABULAR
baseURL: "https://tabular.com/"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

page:
    # full (100%), wide (90rem), normal (80rem)
    width: full

menu:
  main:
    - identifier: tabular-editor-experience
      name: Tabular Editor Experience
      pageRef: /tabular-editor-experience
      weight: 1
    - identifier: tabular-developers
      name: TABULAR developers
      pageRef: /tabular-developers
      weight: 2 
    - identifier: about
      name: About
      pageRef: /about
      weight: 3
    - name: GitHub
      weight: 5
      url: "https://github.com/tabular-dev"
      params:
        icon: tabgithub
    - name: LinkedIn
      weight: 6
      url: "https://www.linkedin.com/in/cwoolderink/"
      params:
        icon: tabli

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo_horlight01.svg
      dark: images/logo-dark.svg
      link: /
      width: 200

  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: false
    switchesVisible: false

  editURL:
    enable: true
    base: "https://github.com/tabular/tabular.github.io/edit/main/content"

  theme:
    default: light
    disableThemeToggle: true
    displayToggle: false
